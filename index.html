
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- SEO -->
    <title>Noctyr Studio | Games, Web Apps & Applied AI</title>
    <meta
      name="description"
      content="Noctyr Studio is an independent development studio founded by Matías Baltieri, focused on video games, modern web applications, and applied AI solutions."
    />
    <meta
      name="keywords"
      content="Noctyr Studio, Matías Baltieri, game development, indie games, web applications, applied AI"
    />
    <meta name="author" content="Matías Baltieri" />
    <link rel="canonical" href="https://noctyr-studio.com/" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/img/favicon-48x48.png" sizes="48x48" />
    <link rel="icon" type="image/png" href="/img/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
    <link rel="shortcut icon" href="/img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
    <link rel="manifest" href="/img/site.webmanifest" />
   

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Noctyr Studio" />
    <meta property="og:title" content="Noctyr Studio | Games, Web Apps & Applied AI" />
    <meta
      property="og:description"
      content="Independent development studio creating games, web applications, and applied AI experiences."
    />
    <meta property="og:url" content="https://noctyr-studio.com/" />
    <meta property="og:image" content="https://noctyr-studio.com/img/preview.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Noctyr Studio | Games, Web Apps & Applied AI" />
    <meta
      name="twitter:description"
      content="Independent development studio creating games, web applications, and applied AI experiences."
    />
    <meta name="twitter:image" content="https://noctyr-studio.com/img/preview.jpg" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Noctyr Studio",
      "url": "https://noctyr-studio.com/",
      "logo": "https://noctyr-studio.com/img/web-app-manifest-512x512.png",
      "founder": {
        "@type": "Person",
        "name": "Matías Baltieri"
      }
    }
    </script>

    <!-- Structured Data: Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Matías Baltieri",
      "url": "https://noctyr-studio.com/",
      "worksFor": {
        "@type": "Organization",
        "name": "Noctyr Studio"
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Noctyr Studio",
      "url": "https://noctyr-studio.com/"
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
